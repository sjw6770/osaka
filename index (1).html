<style>
:root{--safe-b:env(safe-area-inset-bottom,0px);--tab-h:56px;--head-h:48px}
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
html,body{height:100%;font-family:-apple-system,BlinkMacSystemFont,"Apple SD Gothic Neo",sans-serif;background:#111;color:#eee;overflow:hidden}
#app{height:100%;display:flex;flex-direction:column}

/* 상단 헤더 */
#hd{height:var(--head-h);background:#1a1a1a;display:flex;align-items:center;justify-content:space-between;padding:0 16px;border-bottom:1px solid #333;flex-shrink:0;z-index:20}
#hd h1{font-size:15px;font-weight:700}
#mapBtn{background:#333;color:#eee;border:none;border-radius:20px;padding:6px 14px;font-size:12px;font-weight:600;cursor:pointer;display:flex;align-items:center;gap:4px}
#mapBtn:active{background:#555}

/* 지도 */
#mapWrap{position:relative;flex-shrink:0;transition:height .3s ease;overflow:hidden}
#mapWrap.closed{height:0!important}
#mapWrap.open{height:45vh}
#map{width:100%;height:100%}

/* 콘텐츠 */
#ct{flex:1;overflow-y:auto;-webkit-overflow-scrolling:touch;padding-bottom:calc(var(--tab-h) + var(--safe-b) + 12px)}

/* Day 헤더 */
.dh{padding:16px 18px 12px;border-bottom:1px solid #222}
.dh-t{font-size:16px;font-weight:800}
.dh-s{font-size:12px;color:#888;margin-top:3px}

/* 타임라인 */
.tl{padding:8px 0}
.it{display:flex;gap:10px;padding:14px 18px;border-bottom:1px solid #1a1a1a;cursor:pointer;transition:background .1s;min-height:56px;align-items:flex-start}
.it:active{background:#252525}
.tc{width:40px;flex-shrink:0;text-align:right;font-size:11px;font-weight:700;color:#666;padding-top:2px;line-height:1.4}
.ec{width:28px;flex-shrink:0;font-size:22px;text-align:center}
.ic{flex:1;min-width:0}
.nm{font-size:14px;font-weight:600;line-height:1.4}
.dc{font-size:11.5px;color:#777;margin-top:4px;line-height:1.5}
.tg{display:inline-block;padding:2px 6px;border-radius:4px;font-size:9px;font-weight:700;margin-right:3px;vertical-align:middle}
.t-m{background:#FF6B6B22;color:#FF6B6B}
.t-d{background:#F59E0B22;color:#F59E0B}
.t-s{background:#3B82F622;color:#60A5FA}
.t-p{background:#8B5CF622;color:#A78BFA}
.t-h{background:#10B98122;color:#34D399}
.t-v{background:#6B728022;color:#9CA3AF}
.t-w{background:#EF444422;color:#EF4444}
.arr{color:#444;font-size:14px;flex-shrink:0;padding-top:4px}

/* ALL 탭 섹션 */
.sec{padding:14px 18px;font-size:14px;font-weight:700;color:#aaa;border-bottom:1px solid #222;display:flex;justify-content:space-between;align-items:center;cursor:pointer;min-height:48px}
.sec:active{background:#222}
.sec .cnt{font-size:11px;color:#555;font-weight:400}
.sec-items{overflow:hidden}
.sec-items.hide{display:none}

/* 하단 탭바 */
#tabs{position:fixed;bottom:0;left:0;right:0;height:calc(var(--tab-h) + var(--safe-b));padding-bottom:var(--safe-b);background:#1a1a1a;border-top:1px solid #333;display:flex;z-index:30}
.tab{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:2px;cursor:pointer;color:#555;transition:.15s;padding:4px 0}
.tab:active{background:#252525}
.tab .t-em{font-size:18px}
.tab .t-lb{font-size:9px;font-weight:600}
.tab.on .t-lb{color:#fff}
.tab[data-d="1"].on .t-em,.tab[data-d="1"].on .t-lb{color:#FF6B6B}
.tab[data-d="2"].on .t-em,.tab[data-d="2"].on .t-lb{color:#4ECDC4}
.tab[data-d="3"].on .t-em,.tab[data-d="3"].on .t-lb{color:#FFE66D}
.tab[data-d="4"].on .t-em,.tab[data-d="4"].on .t-lb{color:#A78BFA}
.tab[data-d="all"].on .t-em,.tab[data-d="all"].on .t-lb{color:#fff}

/* 마커 */
.emoji-marker{font-size:22px;text-shadow:0 0 4px #000,0 0 4px #000,0 0 4px #000,0 0 4px #000}

/* 노선 범례 - 지도 위 */
.legend{position:absolute;bottom:8px;left:8px;right:8px;background:rgba(0,0,0,.75);border-radius:8px;padding:6px 10px;font-size:9px;color:#aaa;z-index:500;line-height:1.5;pointer-events:none}

/* 데스크톱 */
@media(min-width:768px){
  #app{flex-direction:row}
  #hd{display:none}
  #mapWrap,#mapWrap.closed,#mapWrap.open{height:100%!important;flex:1;order:2}
  #ct{width:400px;order:1;padding-bottom:0;border-right:1px solid #333}
  #tabs{position:sticky;top:0;height:auto;padding:0;border-top:none;border-bottom:1px solid #333;order:0;flex-direction:column;width:60px;border-right:1px solid #333}
  .tab{padding:14px 4px}
  .tab .t-em{font-size:20px}
  .tab .t-lb{font-size:10px}
  .legend{left:auto;right:8px;width:auto;max-width:280px}
}
</style>
</head>

let mapReady=false,mapObj,mapShown=false;
let markers={},lines={};

function initMap(){
  if(mapReady)return;
  mapObj=L.map('map',{zoomControl:false}).setView([34.685,135.505],13);
  L.control.zoom({position:'topright'}).addTo(mapObj);
  L.tileLayer('https://mt1.google.com/vt/lyrs=m&hl=ko&x={x}&y={y}&z={z}',{attribution:'©Google',maxZoom:19}).addTo(mapObj);
  mapReady=true;

  function mk(p){
    const ic=L.divIcon({html:`<div class="emoji-marker">${p.em}</div>`,className:'',iconSize:[30,26],iconAnchor:[15,22]});
    const m=L.marker([p.la,p.ln],{icon:ic});
    const q=GQ[p.nm]||GQ[p.nm.replace(/\s*\(.*?\)/g,'')]||p.nm;
    const u=`https://www.google.com/maps/search/?api=1&query=${encodeURIComponent(q)}`;
    m.bindPopup(`<b>${p.em} ${p.nm}</b><br><small>${p.dc}</small><br><a href="${u}" target="_blank" style="color:#4ECDC4">구글맵 열기→</a>`);
    return m;
  }
  D.forEach(d=>{
    const ms=[];const cs=[];
    d.items.forEach(it=>{if(!it.la)return;ms.push({m:mk(it),it});cs.push([it.la,it.ln])});
    markers[d.d]=ms;
    if(cs.length>1)lines[d.d]=L.polyline(cs,{color:d.c,weight:3,opacity:.5,dashArray:'8,6'});
  });
  markers['all']=ALL.map(p=>({m:mk(p),it:p}));
}

function toggleMap(){
  const w=document.getElementById('mapWrap');
  const b=document.getElementById('mapBtn');
  mapShown=!mapShown;
  if(mapShown){
    initMap();
    w.classList.remove('closed');
    w.classList.add('open');
    b.textContent='📋 리스트';
    setTimeout(()=>{mapObj.invalidateSize();showOnMap(active)},350);
  }else{
    w.classList.remove('open');
    w.classList.add('closed');
    b.textContent='🗺 지도';
  }
}

function showOnMap(d){
  if(!mapReady)return;
  Object.values(markers).flat().forEach(({m})=>mapObj.removeLayer(m));
  Object.values(lines).forEach(l=>mapObj.removeLayer(l));
  (markers[d]||[]).forEach(({m})=>m.addTo(mapObj));
  if(lines[d])lines[d].addTo(mapObj);
  const cs=(markers[d]||[]).filter(({it})=>it.la).map(({it})=>[it.la,it.ln]);
  if(cs.length)mapObj.fitBounds(cs,{padding:[30,30]});
}

function focusPin(d,idx){
  if(!mapShown)toggleMap();
  setTimeout(()=>{
    const f=(markers[d]||[])[idx];
    if(f){mapObj.setView([f.it.la,f.it.ln],16);f.m.openPopup()}
  },mapReady?100:500);
}

const tabsE=document.getElementById('tabs');

[...D.map(d=>({d:d.d,em:d.em,lb:d.t.replace('Day ','')})),{d:'all',em:'📍',lb:'전체'}].forEach(x=>{
  const t=document.createElement('div');

  t.onclick=()=>show(x.d);
  tabsE.appendChild(t);
});

function show(d){
  active=d;
  document.querySelectorAll('.tab').forEach(t=>t.classList.toggle('on',t.dataset.d==''+d));
  if(mapShown)showOnMap(d);
  ctE.innerHTML='';

    ctE.insertAdjacentHTML('beforeend',`<div class="dh"><div class="dh-t">📍 전체 저장 장소</div><div class="dh-s">내가 알아온 곳 전체 ${ALL.length}곳</div></div>`);

    gs.forEach(g=>{
      const items=ALL.filter(p=>g.tg==='p'?(p.tg==='p'||p.tg==='h'):p.tg===g.tg);
      if(!items.length)return;
      const sec=document.createElement('div');sec.className='sec';
      sec.innerHTML=`${g.l} <span class="cnt">${items.length}곳</span>`;
      const wrap=document.createElement('div');wrap.className='sec-items';
      items.forEach((p,i)=>{
        const el=document.createElement('div');el.className='it';
        const wh=p.dc.includes('⚠')?`<span class="tg t-w">⚠</span>`:'';
        el.innerHTML=`<div class="ec">${p.em}</div><div class="ic"><div class="nm">${p.nm}</div><div class="dc"><span class="tg ${TC[p.tg]}">${TL[p.tg]}</span>${wh}${p.dc}</div></div><div class="arr">›</div>`;
        const allIdx=ALL.indexOf(p);
        el.onclick=()=>focusPin('all',allIdx);
        wrap.appendChild(el);
      });
      sec.onclick=(e)=>{e.stopPropagation();wrap.classList.toggle('hide')};
      ctE.appendChild(sec);ctE.appendChild(wrap);
    });
    return;
  }

  const dd=D.find(x=>x.d===d);
  ctE.insertAdjacentHTML('beforeend',`<div class="dh" style="border-left:4px solid ${dd.c}"><div class="dh-t">${dd.t}</div><div class="dh-s">${dd.s}</div></div>`);
  const tl=document.createElement('div');tl.className='tl';

    el.onclick=()=>focusPin(d,i);
    tl.appendChild(el);
  });
  ctE.appendChild(tl);
}

show(1);

// 데스크톱이면 지도 자동 표시
if(window.innerWidth>=768){
  setTimeout(()=>{
    mapShown=true;
    document.getElementById('mapWrap').classList.remove('closed');
    document.getElementById('mapWrap').classList.add('open');
    initMap();
    setTimeout(()=>{mapObj.invalidateSize();showOnMap(1)},100);
  },100);
}
</script>
